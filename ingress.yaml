apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  labels:
    app.kubernetes.io/name: myingress
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: inventory-backend-service
            port: 
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: inventory-frontend-service
            port: 
              number: 3000


              
